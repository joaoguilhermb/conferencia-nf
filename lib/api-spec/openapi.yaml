openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API de Conferência de Notas Fiscais
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: reconciliacao
    description: Reconciliação de notas fiscais
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /reconciliacao/processar:
    post:
      operationId: processarReconciliacao
      tags: [reconciliacao]
      summary: Processar reconciliação de notas fiscais
      description: Recebe os dois arquivos via multipart/form-data (livroFiscal e apollo) e retorna faltantes e divergências
      responses:
        "200":
          description: Resultado da reconciliação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultadoReconciliacao"
        "400":
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErroResposta:
      type: object
      properties:
        erro:
          type: string
      required:
        - erro

    NotaFaltante:
      type: object
      description: Nota presente no Livro Fiscal mas não localizada no Apollo
      properties:
        numeroNota:
          type: string
        dataEmissao:
          type: string
        cnpj:
          type: string
        status:
          type: string
        valorBase:
          type: number
        valorISS:
          type: number
      required:
        - numeroNota
        - dataEmissao
        - cnpj
        - status
        - valorBase
        - valorISS

    NotaDivergente:
      type: object
      description: Nota presente nos dois arquivos mas com divergência de valor maior que R$0,05
      properties:
        numeroNota:
          type: string
        cnpj:
          type: string
        valorBaseLF:
          type: number
        valorBaseApollo:
          type: number
        difBase:
          type: number
        valorISSLF:
          type: number
        valorISSApollo:
          type: number
        difISS:
          type: number
      required:
        - numeroNota
        - cnpj
        - valorBaseLF
        - valorBaseApollo
        - difBase
        - valorISSLF
        - valorISSApollo
        - difISS

    ResumoReconciliacao:
      type: object
      properties:
        totalLivroFiscal:
          type: integer
        totalFaltantes:
          type: integer
        totalDivergencias:
          type: integer
      required:
        - totalLivroFiscal
        - totalFaltantes
        - totalDivergencias

    ResultadoReconciliacao:
      type: object
      properties:
        resumo:
          $ref: "#/components/schemas/ResumoReconciliacao"
        faltantes:
          type: array
          items:
            $ref: "#/components/schemas/NotaFaltante"
        divergencias:
          type: array
          items:
            $ref: "#/components/schemas/NotaDivergente"
      required:
        - resumo
        - faltantes
        - divergencias
